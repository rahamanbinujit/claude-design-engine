<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!--
    Claude Design Engine — YouTube Thumbnail Template (1280x720)
    Created by Rahaman Bin Ujit

    Rules: Max 4-5 words. Must read at 120px width. High contrast.

    Export: node scripts/export-png.js templates/thumbnail-720.html output.png 1280 720
  -->

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Montserrat', sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 48px 60px;
      position: relative;
    }

    /* Text side (left) */
    .text-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      z-index: 2;
    }

    .headline {
      font-size: 96px;
      font-weight: 900;
      line-height: 1.0;
      color: #FFFFFF;
      text-transform: uppercase;
      text-shadow:
        4px 4px 0 rgba(0,0,0,0.8),
        -2px -2px 0 rgba(0,0,0,0.4);
    }

    .headline .accent {
      /* Use a contrasting color */
      color: #FFD93D;
    }

    /* Face/image side (right) — optional */
    .image-side {
      width: 45%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-side img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }

    /* Subtle gradient overlay for text readability */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 60%;
      height: 100%;
      background: linear-gradient(to right, rgba(26,26,46,0.9), transparent);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="overlay"></div>

    <div class="text-side">
      <h1 class="headline">
        I Quit<br>
        <span class="accent">My Job</span>
      </h1>
    </div>

    <div class="image-side">
      <!-- Replace with your face/subject image -->
      <!-- <img src="face-cutout.png" alt="face"> -->
    </div>

  </div>
</body>
</html>
