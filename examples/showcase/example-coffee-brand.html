<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; overflow: hidden; background: #1C1510; font-family: 'Inter', sans-serif; position: relative; }
.photo-half {
  position: absolute; top: 0; right: 0; width: 50%; height: 100%;
  background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1080&h=1080&fit=crop') center/cover;
}
.photo-half::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, #1C1510 0%, rgba(28,21,16,0.7) 30%, transparent 100%);
}
.container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 52px; position: relative; z-index: 2; }
.top { display: flex; justify-content: space-between; align-items: center; }
.tag { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(210,180,140,0.5); }
.middle { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; max-width: 55%; }
.headline { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 900; line-height: 1.08; color: #F5E6D3; letter-spacing: -1px; }
.headline .warm { color: #D4A574; }
.line { width: 48px; height: 2px; background: #D4A574; }
.body { font-size: 14px; font-weight: 300; color: rgba(245,230,211,0.45); line-height: 1.7; }
.pill { display: inline-block; font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: #D4A574; border: 1px solid rgba(212,165,116,0.3); padding: 6px 16px; border-radius: 100px; margin-top: 8px; }
.bottom { display: flex; justify-content: space-between; align-items: flex-end; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 16px; color: #F5E6D3; }
.brand-role { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(212,165,116,0.4); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 3px; }
</style>
</head>
<body>
<div class="photo-half"></div>
<div class="container">
  <div class="top">
    <div class="tag">Artisan Roasters</div>
    <div class="tag">Est. 2018</div>
  </div>
  <div class="middle">
    <h1 class="headline">Every cup tells a <span class="warm">story.</span></h1>
    <div class="line"></div>
    <p class="body">Single-origin beans sourced from small farms across Ethiopia, Colombia, and Guatemala. Roasted in small batches. Never rushed.</p>
    <div class="pill">Shop the collection</div>
  </div>
  <div class="bottom">
    <div>
      <div class="brand-name">Ember & Stone</div>
      <div class="brand-role">Small Batch Coffee</div>
    </div>
  </div>
</div>
</body>
</html>
